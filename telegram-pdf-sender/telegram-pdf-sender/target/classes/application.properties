# ========================================
# SERVER CONFIGURATION
# ========================================
server.port=8080
spring.application.name=telegram-pdf-sender

# ========================================
# TELEGRAM BOT CONFIGURATION
# ========================================
telegram.bot.token=8337063777:AAFNtu1xlKyZHPcBmw4UI6uKisjOb4bYjn8
telegram.bot.username=my_pdf07_sender_bot
telegram.bot.chatId=1315851716

# ========================================
# PDF STORAGE CONFIGURATION
# ========================================
pdf.storage.path=G:/cement_project_pdf
pdf.file.extension=.pdf

# ========================================
# SCHEDULER CONFIGURATION
# ========================================
# Cron Expression: second minute hour day month weekday
# 0 0 20 * * * = Every day at 8:00 PM
# Change to 3:35 PM (15:35 in 24-hour format)
scheduler.pdf.send.cron=0 37 15 * * *
scheduler.pdf.send.enabled=true
scheduler.timezone=Asia/Kolkata

# ========================================
# LOGGING CONFIGURATION
# ========================================
logging.level.root=INFO
logging.level.com.cement.telegrampdf=DEBUG
logging.level.org.telegram=INFO
logging.level.org.springframework.scheduling=DEBUG

# Log file configuration
logging.file.name=logs/telegram-pdf-sender.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ========================================
# ACTUATOR CONFIGURATION (Health Checks)
# ========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.metrics.enable.jvm=true

# ========================================
# ERROR HANDLING
# ========================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# ========================================
# TELEGRAM API CONFIGURATION
# ========================================
telegram.api.max-file-size=50MB
telegram.api.connection-timeout=60
telegram.api.retry-attempts=3